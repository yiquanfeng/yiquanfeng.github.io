<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Yiquan Feng | Works</title>
    <meta name="description" content="Yiquan Feng 的简洁作品展示页。" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Noto+Sans+SC:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="layout">
      <section class="profile-card">
        <img
          class="avatar"
          src="https://github.com/yiquanfeng.png"
          alt="Yiquan Feng GitHub Avatar"
        />
        <div class="profile-copy">
          <h1>Yiquan Feng</h1>
          <p>作品展示</p>
        </div>
      </section>

      <section class="works-board" aria-label="作品链接列表">
        <a class="work-tile" href="https://github.com/yiquanfeng/yiquanfeng.github.io" target="_blank" rel="noreferrer">
          <span class="work-name">这个主页</span>
          <span class="work-link">GitHub</span>
        </a>
        <a class="work-tile" href="https://github.com/yiquanfeng" target="_blank" rel="noreferrer">
          <span class="work-name">GitHub Profile</span>
          <span class="work-link">Open</span>
        </a>
        <a class="work-tile is-placeholder" href="#">
          <span class="work-name">作品 03</span>
          <span class="work-link">待替换</span>
        </a>
        <a class="work-tile is-placeholder" href="#">
          <span class="work-name">作品 04</span>
          <span class="work-link">待替换</span>
        </a>
        <a class="work-tile is-placeholder" href="#">
          <span class="work-name">作品 05</span>
          <span class="work-link">待替换</span>
        </a>
        <a class="work-tile is-placeholder" href="#">
          <span class="work-name">作品 06</span>
          <span class="work-link">待替换</span>
        </a>
      </section>
    </main>
  </body>
</html>
